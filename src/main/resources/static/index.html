<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Engineering | Josue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col font-sans">

<div id="notifications" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

<header class="p-4 bg-slate-800 shadow-xl border-b border-slate-700 flex justify-between items-center">
    <div>
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            Protocolo WebSocket Activo
        </h1>
        <p class="text-slate-400 text-xs">UNJFSC - Ingeniería Informática</p>
    </div>
    <div id="status-badge" class="text-xs bg-slate-700 px-3 py-1 rounded-full border border-slate-600">
        Desconectado
    </div>
</header>

<main id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
</main>

<footer class="p-6 bg-slate-800 border-t border-slate-700">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-3">
        <input type="text" id="username" placeholder="ID Usuario"
               class="input-field md:w-1/4">
        <div class="flex-1 flex gap-2">
            <input type="text" id="message" placeholder="Escribir trama de datos..."
                   class="input-field flex-1">
            <button onclick="sendMessage()" class="btn-send">
                Enviar
            </button>
        </div>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="chat.js"></script>
</body>
</html>
